services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goflyto
      POSTGRES_USER: goflyto
      POSTGRES_PASSWORD: goflyto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
